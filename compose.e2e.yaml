services:
  pgvector:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: knowledgehub
      POSTGRES_PASSWORD: kh_e2e_secret
      POSTGRES_USER: kh_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kh_e2e -d knowledgehub"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "55433:5432"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data
    environment:
      MINIO_ROOT_USER: kh_e2e
      MINIO_ROOT_PASSWORD: kh_e2e_minio_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "59000:9000"
