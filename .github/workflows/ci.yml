name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Verify backend
        working-directory: knowledge-hub-api
        run: ./mvnw clean verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: knowledge-hub-web/package-lock.json
      - run: npm ci
        working-directory: knowledge-hub-web
      - run: npm run lint
        working-directory: knowledge-hub-web
      - run: npm run typecheck
        working-directory: knowledge-hub-web
      - run: npm run format:check
        working-directory: knowledge-hub-web
      - run: npm test
        working-directory: knowledge-hub-web
      - run: npm run build
        working-directory: knowledge-hub-web

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: knowledge-hub-web/package-lock.json
      - run: npm ci
        working-directory: knowledge-hub-web
      - run: npm run e2e:install
        working-directory: knowledge-hub-web
      - run: npm run e2e
        working-directory: knowledge-hub-web
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: knowledge-hub-web/playwright-report
          retention-days: 7
