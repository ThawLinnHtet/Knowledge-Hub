services:
  pgvector:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledgehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kh_dev_secret}
      POSTGRES_USER: ${POSTGRES_USER:-kh_user}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      org.springframework.boot.service-connection: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kh_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kh_dev_minio_secret}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      org.springframework.boot.service-connection: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgvector_data:
  minio_data:
